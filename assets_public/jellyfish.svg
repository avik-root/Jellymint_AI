<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100%" height="100%">
  <defs>
    <radialGradient id="welcomeBellGrad" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.25)" />
      <stop offset="70%" stop-color="rgba(139, 92, 246, 0.45)" />
      <stop offset="90%" stop-color="rgba(99, 102, 241, 0.8)" />
      <stop offset="100%" stop-color="rgba(236, 72, 153, 0.9)" />
    </radialGradient>
    <linearGradient id="welcomeInnerBellGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(236, 72, 153, 0.8)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.3)" />
    </linearGradient>
    <linearGradient id="welcomeFrillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(244, 63, 94, 0.85)" />
      <stop offset="50%" stop-color="rgba(236, 72, 153, 0.5)" />
      <stop offset="100%" stop-color="rgba(192, 132, 252, 0.15)" />
    </linearGradient>
  </defs>
  <style>
    .jellyfish-icon {
      transform-origin: center 30px;
      animation: jelly-swim 2.5s infinite ease-in-out;
    }
    .tentacle {
      transform-origin: center 36px;
    }
    .t1, .t3, .t5 {
      animation: tentacle-wiggle-left 2.8s infinite ease-in-out;
    }
    .t2, .t4, .t6 {
      animation: tentacle-wiggle-right 2.5s infinite ease-in-out;
    }
    .inner-t {
      transform-origin: center 36px;
      animation: inner-tentacle-wiggle 1.8s infinite ease-in-out;
    }
    
    @keyframes jelly-swim {
      0%, 100% {
        transform: translateY(2px) scaleY(0.96) scaleX(1.02);
      }
      40% {
        transform: translateY(-6px) scaleY(1.06) scaleX(0.94);
      }
      75% {
        transform: translateY(1px) scaleY(0.97) scaleX(1.01);
      }
    }
    @keyframes tentacle-wiggle-left {
      0%, 100% {
        transform: rotate(0deg) skewX(0deg);
      }
      50% {
        transform: rotate(-10deg) skewX(-5deg);
      }
    }
    @keyframes tentacle-wiggle-right {
      0%, 100% {
        transform: rotate(0deg) skewX(0deg);
      }
      50% {
        transform: rotate(10deg) skewX(5deg);
      }
    }
    @keyframes inner-tentacle-wiggle {
      0%, 100% {
        transform: scaleX(1) scaleY(1);
      }
      50% {
        transform: scaleX(1.15) scaleY(0.92);
      }
    }
  </style>
  <g class="jellyfish-icon">
    <path class="jelly-inner-bell" d="M 30,36 C 30,16 70,16 70,36 C 70,38 30,38 30,36 Z" fill="url(#welcomeInnerBellGrad)" />
    <g class="jelly-ribs" stroke="rgba(255, 255, 255, 0.35)" stroke-width="0.8" fill="none">
      <path d="M 50,8 L 50,36" />
      <path d="M 50,8 C 40,15 35,25 32,36" />
      <path d="M 50,8 C 60,15 65,25 68,36" />
      <path d="M 50,8 C 30,12 22,22 18,36" />
      <path d="M 50,8 C 70,12 78,22 82,36" />
    </g>
    <path class="jelly-outer-bell" d="M 12,36 C 12,4 88,4 88,36 C 88,40 82,42 76,40 C 68,38 60,40 50,40 C 40,40 32,38 24,40 C 18,42 12,40 12,36 Z" fill="url(#welcomeBellGrad)" stroke="rgba(255, 255, 255, 0.25)" stroke-width="0.5" />
    <g class="jelly-dots" fill="rgba(255, 255, 255, 0.95)">
      <circle cx="50" cy="12" r="0.8" />
      <circle cx="42" cy="15" r="0.6" />
      <circle cx="58" cy="14" r="0.7" />
      <circle cx="35" cy="22" r="0.5" />
      <circle cx="65" cy="21" r="0.6" />
      <circle cx="48" cy="20" r="0.5" />
      <circle cx="53" cy="24" r="0.4" />
      <circle cx="30" cy="28" r="0.5" />
      <circle cx="70" cy="27" r="0.4" />
    </g>
    <g class="jelly-oral-arms">
      <path class="inner-t t-inner-1" d="M 44,38 C 42,50 34,60 40,75 C 46,90 35,100 42,112 C 45,118 38,122 40,128" fill="none" stroke="url(#welcomeFrillGrad)" stroke-width="2.5" stroke-linecap="round" />
      <path class="inner-t t-inner-2" d="M 56,38 C 58,50 66,60 60,75 C 54,90 65,100 58,112 C 55,118 62,122 60,128" fill="none" stroke="url(#welcomeFrillGrad)" stroke-width="2.5" stroke-linecap="round" />
      <path class="inner-t t-inner-3" d="M 50,38 C 47,48 53,58 48,70 C 43,82 55,92 50,105 C 46,115 54,120 50,130" fill="none" stroke="url(#welcomeFrillGrad)" stroke-width="3.0" stroke-linecap="round" />
    </g>
    <g class="jelly-tentacles" fill="none" stroke="rgba(236, 72, 153, 0.45)" stroke-width="0.8">
      <path class="tentacle t1" d="M 24,39 Q 30,65 22,92 T 26,128" />
      <path class="tentacle t2" d="M 32,40 Q 28,65 36,92 T 30,128" />
      <path class="tentacle t3" d="M 40,40 Q 37,65 44,92 T 38,128" />
      <path class="tentacle t4" d="M 60,40 Q 63,65 56,92 T 62,128" />
      <path class="tentacle t5" d="M 68,40 Q 72,65 64,92 T 70,128" />
      <path class="tentacle t6" d="M 76,39 Q 70,65 78,92 T 74,128" />
    </g>
  </g>
</svg>
